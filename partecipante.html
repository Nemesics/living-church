<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Q&A — Fai una domanda</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

  :root {
    --teal-deep:   #173943;
    --teal-mid:    #1e4d59;
    --teal-soft:   #2a6272;
    --white:       #ffffff;
    --white-90:    rgba(255,255,255,0.9);
    --white-70:    rgba(255,255,255,0.7);
    --white-60:    rgba(255,255,255,0.6);
    --white-40:    rgba(255,255,255,0.4);
    --white-30:    rgba(255,255,255,0.3);
    --white-15:    rgba(255,255,255,0.15);
    --white-08:    rgba(255,255,255,0.08);
    --white-06:    rgba(255,255,255,0.06);
    --gold:        #c8a96e;
    --gold-dim:    rgba(200,169,110,0.2);
    --success:     #6abf8a;
    --error:       #e07070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--teal-deep);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,0,0,0.2) 0%, transparent 60%);
  }

  .container {
    width: 100%;
    max-width: 440px;
    animation: fadeUp 0.55s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-wrap {
    margin: 0 auto 20px;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeUp 0.55s cubic-bezier(.22,.68,0,1.2) 0.1s both;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 15px;
    color: var(--white-60);
    line-height: 1.65;
    font-weight: 300;
  }

  /* ── PRIVACY NOTE ── */
  .privacy-note {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--white-40);
    line-height: 1.5;
    justify-content: center;
  }

  .privacy-note svg { flex-shrink: 0; color: var(--white-40); }

  /* ── CARD ── */
  .card {
    background: #1e4d59;
    border: none;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--white-70);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  textarea {
    width: 100%;
    min-height: 150px;
    padding: 14px 16px;
    background: #eef3f3;
    border: none;
    border-radius: 12px;
    font-family: 'Lora', serif;
    font-size: 16px;
    color: #173943;
    line-height: 1.65;
    resize: vertical;
    transition: box-shadow 0.2s;
    outline: none;
  }

  textarea::placeholder {
    color: #7aa0a8;
    font-style: normal;
  }

  textarea:focus {
    box-shadow: 0 0 0 3px var(--gold-dim);
  }

  .char-count {
    text-align: right;
    font-size: 12px;
    color: var(--white-40);
    margin-top: 6px;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .char-count.over { color: var(--error); }

  /* ── BUTTON ── */
  button {
    width: 100%;
    padding: 15px 24px;
    background: var(--gold);
    color: var(--teal-deep);
    border: none;
    border-radius: 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.02em;
  }

  button:hover:not(:disabled) {
    background: #d9bc84;
    box-shadow: 0 6px 24px rgba(200,169,110,0.35);
    transform: translateY(-1px);
  }

  button:active:not(:disabled) { transform: translateY(0); }

  button:disabled {
    background: var(--white-15);
    color: var(--white-40);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── SUCCESS ── */
  .success-screen {
    display: none;
    text-align: center;
    padding: 28px 12px;
  }

  .success-screen.visible {
    display: block;
    animation: fadeUp 0.4s ease both;
  }

  .success-icon {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .success-screen h2 {
    font-family: 'Lora', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 10px;
  }

  .success-screen p {
    color: var(--white-60);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .another-btn {
    display: inline-block;
    width: auto;
    background: transparent;
    color: var(--white-60);
    border: 1.5px solid var(--white-30);
    padding: 11px 28px;
    font-size: 15px;
    font-weight: 400;
    border-radius: 12px;
  }

  .another-btn:hover {
    background: var(--white-06);
    color: var(--white);
    border-color: var(--white-60);
    transform: none;
    box-shadow: none;
  }

  .form-section.hidden { display: none; }

  /* ── DOTS ── */
  .dots {
    display: inline-flex;
    gap: 4px;
    vertical-align: middle;
    margin-left: 8px;
  }
  .dots span {
    width: 5px; height: 5px;
    background: var(--teal-deep);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40%           { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">

    <!-- Logo Living Church (originale) -->
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="72" height="79" viewBox="0 0 172 188">
        <!-- Solo il simbolo, colore bianco -->
        <path d="M 77.44 173.87 C59.84,162.49 55.67,159.44 51.78,155.06 C45.22,147.70 40.53,139.78 37.45,130.85 L 34.56 122.50 L 34.20 92.25 L 33.85 62.00 L 44.49 62.00 C54.16,62.00 55.09,62.16 54.62,63.75 C54.34,64.71 53.81,67.19 53.44,69.25 C52.81,72.83 52.60,73.00 48.89,73.00 L 45.00 73.00 L 45.00 94.95 C45.00,119.66 45.69,124.43 50.74,134.81 C55.42,144.43 62.83,151.85 76.18,160.32 L 86.87 167.09 L 98.35 159.54 C111.37,150.98 117.13,145.13 122.22,135.32 C127.82,124.53 128.50,120.20 128.50,95.50 L 128.50 73.50 L 124.44 73.20 C120.43,72.91 120.36,72.83 119.36,67.95 C118.80,65.22 118.57,62.77 118.84,62.49 C119.11,62.22 123.76,62.00 129.17,62.00 L 139.00 62.00 L 139.00 90.34 C139.00,122.45 138.14,128.24 131.45,140.97 C125.66,151.98 118.34,159.18 102.27,169.69 C94.44,174.81 87.44,179.00 86.71,179.00 C85.99,179.00 81.81,176.69 77.44,173.87 ZM 70.74 121.50 C62.08,104.17 55.00,89.77 55.00,89.50 C55.00,89.22 69.40,89.00 87.00,89.00 L 119.01 89.00 L 103.00 121.00 C94.20,138.60 86.88,153.00 86.74,153.00 C86.60,153.00 79.40,138.82 70.74,121.50 ZM 93.99 115.01 C97.85,107.32 101.00,100.57 101.00,100.01 C101.00,99.38 95.63,99.00 86.50,99.00 C78.53,99.00 72.00,99.22 72.00,99.49 C72.00,100.15 86.40,129.00 86.73,129.00 C86.87,129.00 90.14,122.71 93.99,115.01 ZM 59.18 74.75 C59.66,65.67 62.00,59.36 68.50,49.57 C72.95,42.86 84.74,30.00 86.43,30.00 C90.05,30.00 107.32,51.64 111.29,61.16 C113.69,66.90 115.18,75.53 114.45,79.44 C113.78,82.98 113.75,83.00 108.54,83.00 L 103.29 83.00 L 103.76 78.12 C104.02,75.43 103.68,71.49 103.01,69.37 C101.37,64.14 94.97,53.48 90.26,48.10 L 86.40 43.70 L 81.67 49.60 C79.07,52.84 75.27,58.85 73.22,62.95 C70.06,69.28 69.51,71.34 69.57,76.70 L 69.65 83.00 L 64.20 83.00 L 58.75 83.00 L 59.18 74.75 Z" fill="white"/>
      </svg>
    </div>

    <h1>Fai una domanda</h1>
    <p class="subtitle">La tua domanda sarà ricevuta dalla regia</p>
  </div>

  <div class="privacy-note">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
    <span>Le domande sono anonime e visibili solo alla regia</span>
  </div>

  <div class="card">
    <div class="form-section" id="formSection">
      <textarea
        id="question"
        placeholder="Scrivi qui la tua domanda…"
        maxlength="400"
        oninput="updateCount()"
      ></textarea>
      <div class="char-count" id="charCount">0 / 400</div>
      <button id="sendBtn" onclick="sendQuestion()" disabled>
        Invia domanda
      </button>
      <div id="sendError" style="display:none;margin-top:12px;text-align:center;font-size:13px;color:var(--error);line-height:1.5"></div>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2>Domanda inviata!</h2>
      <p>Grazie. La tua domanda è stata ricevuta dalla regia e potrà essere proposta durante l'incontro.</p>
      <button class="another-btn" onclick="resetForm()">Invia un'altra domanda</button>
    </div>
  </div>

  <div style="text-align:center;margin-top:28px;padding-bottom:16px">
    <div style="font-family:'Lora',serif;font-size:13px;font-weight:600;color:rgba(255,255,255,0.35);margin-bottom:3px">Living Q&A</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.2)">© 2026 Living Church — Tutti i diritti riservati.</div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApq1nm6YDTHguHKF1rwAKa7Jxkr1hU7hU",
    authDomain: "living-church.firebaseapp.com",
    projectId: "living-church",
    storageBucket: "living-church.firebasestorage.app",
    messagingSenderId: "779934743570",
    appId: "1:779934743570:web:fa7b9ddb63f5182d17eccb"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window.updateCount = function() {
    const ta  = document.getElementById('question');
    const val = ta.value.trim();
    const cnt = ta.value.length;
    document.getElementById('charCount').textContent = cnt + ' / 400';
    document.getElementById('charCount').className   = 'char-count' + (cnt > 380 ? ' over' : '');
    document.getElementById('sendBtn').disabled      = val.length < 5;
  };

  window.resetForm = function() {
    const btn = document.getElementById('sendBtn');
    document.getElementById('question').value = '';
    btn.textContent = 'Invia domanda';
    btn.disabled = true;
    document.getElementById('charCount').textContent = '0 / 400';
    document.getElementById('charCount').className = 'char-count';
    document.getElementById('formSection').classList.remove('hidden');
    document.getElementById('successScreen').classList.remove('visible');
  };

  const THROTTLE_MS = 20000;
  let lastSent = 0;
  let countdownTimer = null;

  window.sendQuestion = async function() {
    const text = document.getElementById('question').value.trim();
    if (text.length < 5) return;

    // Throttle check
    const now = Date.now();
    const elapsed = now - lastSent;
    if (lastSent > 0 && elapsed < THROTTLE_MS) {
      const remaining = Math.ceil((THROTTLE_MS - elapsed) / 1000);
      showThrottle(remaining);
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = 'Invio in corso<span class="dots"><span></span><span></span><span></span></span>';

    try {
      await addDoc(collection(db, 'domande'), {
        testo:     text,
        timestamp: serverTimestamp(),
        stato:     'in_attesa'
      });
      lastSent = Date.now();
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('successScreen').classList.add('visible');
    } catch(err) {
      console.error(err);
      btn.disabled  = false;
      btn.textContent = 'Invia domanda';
      const errEl = document.getElementById('sendError');
      errEl.textContent = 'Errore nell\'invio. Controlla la connessione e riprova.';
      errEl.style.display = 'block';
      setTimeout(() => { errEl.style.display = 'none'; }, 4000);
    }
  };

  function showThrottle(seconds) {
    const errEl = document.getElementById('sendError');
    if (countdownTimer) clearInterval(countdownTimer);
    let remaining = seconds;
    errEl.style.color = 'var(--gold)';
    errEl.textContent = `Puoi inviare un'altra domanda tra ${remaining} secondi.`;
    errEl.style.display = 'block';
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        errEl.style.display = 'none';
        errEl.style.color = 'var(--error)';
      } else {
        errEl.textContent = `Puoi inviare un'altra domanda tra ${remaining} secondi.`;
      }
    }, 1000);
  }
</script>
</body>
</html>
